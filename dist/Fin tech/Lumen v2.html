<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumen v2 — HIG-aligned</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0b10; }
  body { font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lumen/tokens.jsx"></script>
<script type="text/babel" src="lumen/primitives.jsx"></script>
<script type="text/babel" src="lumen-v2/v2-primitives.jsx"></script>
<script type="text/babel" src="lumen-v2/v2-screens.jsx"></script>
<script type="text/babel">
function AppV2() {
  const screens = [
    { id: 'home',      label: '01 · Home',           comp: <HomeV2/> },
    { id: 'money',     label: '02 · Money',          comp: <MoneyV2/> },
    { id: 'spotlight', label: '03 · Spotlight AI',   comp: <SpotlightV2/> },
    { id: 'send',      label: '04 · Send (sheet)',   comp: <SendSheetV2/> },
    { id: 'type',      label: '05 · Type system',    comp: <TypeSpecV2/> },
  ];
  return (
    <div style={{
      minHeight: '100vh', padding: '64px 56px 80px',
      background: 'radial-gradient(120% 80% at 0% 0%, #1b1830 0%, #0a0b10 60%), #0a0b10',
      fontFamily: L.font, color: L.text,
    }}>
      <div style={{ marginBottom: 56, maxWidth: 920 }}>
        <div style={{ fontSize: 11, color: L.textDim, fontFamily: L.mono, letterSpacing: 2, textTransform: 'uppercase' }}>Revision · v2</div>
        <div style={{ fontSize: 36, fontWeight: 500, letterSpacing: -1, marginTop: 4 }}>
          Lumen <span style={{ fontFamily: L.serif, fontStyle: 'italic', color: L.textDim, fontWeight: 400 }}>— HIG-aligned</span>
        </div>
        <div style={{ fontSize: 15, color: L.textDim, marginTop: 18, lineHeight: 1.5, maxWidth: 720 }}>
          4 labeled tabs · AI as Spotlight overlay · 17pt body register · Send as sheet with decimalPad · solid surfaces (glass on chrome only) · 44pt hit targets · SF-Symbols-style icons.
        </div>
        <div style={{ marginTop: 18 }}>
          <a href="index.html" style={{ fontSize: 13, fontFamily: L.mono, color: L.cyan, textDecoration: 'none', letterSpacing: 1 }}>← BACK TO V1</a>
        </div>
      </div>

      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(420px, 1fr))',
        gap: '64px 32px', justifyItems: 'center',
      }}>
        {screens.map(s => (
          <div key={s.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            <div style={{ fontSize: 11, fontFamily: L.mono, letterSpacing: 2, textTransform: 'uppercase', color: L.textDim, marginBottom: 18 }}>{s.label}</div>
            <Phone screenLabel={s.label}>{s.comp}</Phone>
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<AppV2/>);
</script>
</body>
</html>
